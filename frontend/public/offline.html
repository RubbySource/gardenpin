<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#2d5a27" />
    <title>Offline · GardenPin</title>
    <style>
      :root {
        --forest: #2d5a27;
        --forest-deep: #1f4019;
        --sand: #f5f0e8;
        --charcoal: #1c1c1e;
        --muted: #6b6b70;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--sand);
        color: var(--charcoal);
        font-family:
          'Plus Jakarta Sans',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 460px;
        width: 100%;
        text-align: center;
        background: #fff;
        padding: 36px 28px;
        border-radius: 22px;
        box-shadow: 0 8px 32px rgba(31, 64, 25, 0.08);
      }
      .emoji-art {
        font-size: 3rem;
        margin-bottom: 18px;
        display: flex;
        justify-content: center;
        gap: 14px;
      }
      .emoji-art span {
        animation: sway 4s ease-in-out infinite;
      }
      .emoji-art span:nth-child(2) { animation-delay: -1.2s; }
      .emoji-art span:nth-child(3) { animation-delay: -2.4s; }
      @keyframes sway {
        0%, 100% { transform: translateY(0) rotate(0); }
        50% { transform: translateY(-6px) rotate(3deg); }
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
        letter-spacing: -0.02em;
        color: var(--forest);
      }
      p {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 0.95rem;
      }
      .btn {
        display: inline-block;
        padding: 12px 22px;
        background: var(--forest);
        color: #fff;
        font-weight: 700;
        text-decoration: none;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        font-size: 0.95rem;
        font-family: inherit;
        transition: background 0.15s, transform 0.15s;
      }
      .btn:hover { background: var(--forest-deep); }
      .btn:active { transform: scale(0.97); }
      .small {
        margin-top: 18px;
        font-size: 0.78rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="emoji-art">
          <span>🌱</span>
          <span>📡</span>
          <span>🌿</span>
        </div>
        <h1>Bez připojení</h1>
        <p>
          Vaše zahrada je pořád v pořádku. Připojte se k internetu a vraťte se sem —
          uložené úkoly a změny se synchronizují automaticky.
        </p>
        <button class="btn" onclick="location.reload()">🔄 Zkusit znovu</button>
        <div class="small">GardenPin pracuje i offline díky uloženým datům.</div>
      </div>
    </div>
    <script>
      // Auto-reload when network comes back
      window.addEventListener('online', () => {
        location.reload();
      });
    </script>
  </body>
</html>
